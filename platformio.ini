[platformio]
default_envs = S_02, S_03, S_04, S_05, robot, devmodule, SOLAR_TEST

[env]
extra_scripts = pre:shared/extra_script.py
lib_compat_mode = off

; these libraries are for AVR and simulation
; targets only, so a reset of this property
; is needed in the `native` configuration
lib_deps =
  bh1750=https://github.com/arcadien/BH1750.git#6d06b87fca6d47b25fbc44d10db3437b597237d1
  tinyi2c=https://github.com/arcadien/tiny-i2c.git#38e7df377d900d163e76e7c165054640a2cf4238
  unity=https://github.com/arcadien/Unity.git#de830151951efa0d791dc3871251220251e9a0e2
  ds18b20=https://github.com/arcadien/avr-ds18b20.git#7ee1bd04aa5d819af60bacee5f618aeb27252ea2
  bmx280=https://github.com/arcadien/SparkFun_BME280_Arduino_Library.git#6b811217248481f8439c678b1e095ad19fa717ca

upload_protocol = custom
upload_flags =
    -Pusb
    -pt84
    -v
    -c
    -b115200
    -B4
    -cavrisp2
upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i

; ── Base environment shared by all physical ATtiny84a targets ─────────────────
[env:avr_base]
platform = atmelavr
board = attiny84
framework = arduino
build_type = release
board_build.f_cpu = 1000000L
board_build.mcu = attiny84a

[env:native_debug]
lib_deps =
platform = native
build_type = debug
debug_test = test_analogFiltering
debug_build_flags = -O0 -ggdb3 -g3
build_flags =
  -DSENSOR_TYPE="{0xEA, 0x4C}"
  -DSENSOR_ID=LacrosseWS7000::Address::ONE
  -DOREGON_MODE_0=1
  -DSLEEP_TIME_IN_SECONDS=32
  -DNATIVE
  -DBATTERY_VOLTAGE_X10_ID=0xA

[env:S_02]
extends = env:avr_base
build_flags =
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DUSE_OREGON
  -DOREGON_RCODE=0x20
  -DOREGON_CHANNEL=1
  -DUSE_BMP280=1
  -DINTERNAL_1v1=1100
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=2200
  -DBATTERY_VOLTAGE_X10_ID=2
  -DUSE_CHARGE_PUMP=1

[env:S_03]
extends = env:avr_base
build_flags =
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DUSE_LACROSSE
  -DLACROSSE_ID=LacrosseWS7000::Address::THREE
  -DUSE_BMP280=1
  -DINTERNAL_1v1=1101
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=1100
  -DBATTERY_VOLTAGE_X10_ID=3
  -DUSE_CHARGE_PUMP=1

[env:S_04]
extends = env:avr_base
build_flags =
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DUSE_OREGON
  -DOREGON_RCODE=0x04
  -DOREGON_CHANNEL=1
  -DUSE_BME280=1
  -DINTERNAL_1v1=1111l
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=2200
  -DBATTERY_VOLTAGE_X10_ID=4

; old HW design — 18650 powered
[env:S_05]
extends = env:avr_base
build_flags =
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DSENSOR_ID=0x06
  -DSENSOR_CHANNEL=2
  -DOREGON_MODE=2
  -DUSE_BME280=1
  -DINTERNAL_1v1=1343l
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=3400
  -DBATTERY_VOLTAGE_X10_ID=5

; Robot has been altered to have same HW interface as TinySensor.
[env:robot]
extends = env:avr_base
build_flags =
  -Os
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DUSE_LACROSSE
  -DLACROSSE_ID=LacrosseWS7000::Address::THREE
  -DSLEEP_TIME_IN_SECONDS=300
  -DUSE_BME280=1
  -DINTERNAL_1v1=1101l
  -DLOW_BATTERY_VOLTAGE=2200
  -DBATTERY_VOLTAGE_X10_ID=6

[env:SOLAR_TEST]
extends = env:avr_base
build_type = debug
platform_packages =
    platformio/tool-simavr
test_speed = 9600
test_framework = unity
debug_tool = simavr
test_testing_command =
    ~/.platformio/packages/tool-simavr/bin/simavr
    -m
    attiny84
    -f
    1000000L
    ${platformio.build_dir}/${this.__env__}/firmware.elf
build_flags =
  -Os
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DINTERNAL_1v1=1092
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=3300
  -DBATTERY_VOLTAGE_X10_ID=10
  -DANALOG1_X10_ID=9
  -DUSE_LACROSSE
  -DLACROSSE_ID=LacrosseWS7000::Address::TWO
  -DUSE_BH1750

; dev module
[env:devmodule]
extends = env:avr_base
build_flags =
  -D__AVR_ATtiny84__
  -UARDUINO
  -DAVR
  -DBATTERY_IS_VCC
  -DSENSOR_ID=LacrosseWS7000::Address::ONE
  -DUSE_BME280=1
  -DINTERNAL_1v1=1092
  -DSLEEP_TIME_IN_SECONDS=300
  -DLOW_BATTERY_VOLTAGE=3300
  -DBATTERY_VOLTAGE_X10_ID=10
