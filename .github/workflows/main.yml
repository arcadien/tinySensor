name: PlatformIO CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  # Native Unity tests (Oregon / Lacrosse / X10 encoders, analog filter, ...)
  test-native:
    name: Native tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio
      - name: Run native tests
        run: pio test -e native_debug

  # Firmware build for every physical target
  build-avr:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [S_02, S_03, S_04, S_05, robot, devmodule, SOLAR_TEST]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio
      - name: Build firmware
        run: pio run -e ${{ matrix.env }}
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.hex
            .pio/build/${{ matrix.env }}/firmware.elf
          if-no-files-found: error
          retention-days: 30

  # Publish a GitHub Release with all firmware artifacts when a vX.Y.Z tag is pushed
  release:
    name: Release
    needs: [test-native, build-avr]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          path: firmware
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: firmware/**/*
          generate_release_notes: true
